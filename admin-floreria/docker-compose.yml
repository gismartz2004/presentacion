services:
  # --- SERVICIO ADMIN API (Node.js/Express) ---
  api-perfumeria:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-prod
    restart: always
    env_file: ./api/.env
    networks:
      - web
      - internal
    volumes:
      - ./api/logs:/app/logs
      - api-uploads:/app/uploads  # Volume persistente para imágenes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-route.rule=Host(`api-admin.perfumeriasz.com`)"
      - "traefik.http.routers.api-route.entrypoints=websecure"
      - "traefik.http.routers.api-route.tls.certresolver=myresolver"
      - "traefik.http.services.api-route.loadbalancer.server.port=4001"
      - "traefik.docker.network=web" #

  # --- SERVICIO ADMIN CLIENT (React) ---
  client-perfumeria:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client-prod
    restart: always
    env_file: ./client/.env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client-route.rule=Host(`admin.perfumeriasz.com`)"
      - "traefik.http.routers.client-route.entrypoints=websecure"
      - "traefik.http.routers.client-route.tls.certresolver=myresolver"
      - "traefik.http.services.client-route.loadbalancer.server.port=80"

networks:
  web:
    external: true
  internal:
    driver: bridge # Esto crea una red privada solo para tus contenedores

volumes:
  api-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/admin-web-data/uploads  # Ruta correcta para este proyecto

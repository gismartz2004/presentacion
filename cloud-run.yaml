apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: difiori-shop
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        # Autoscaling configuration
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      containers:
        - image: us-central1-docker.pkg.dev/${PROJECT_ID}/difiori-repo/difiori-shop:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: "production"
            - name: APP_PUBLIC_SITE_URL
              value: "https://difiori.com"
            - name: BACKEND_URL
              value: "https://api.prd.difiori.com.ec"
            # Opcional: si sirves imágenes desde otro dominio/CDN
            # - name: APP_PUBLIC_ASSET_URL
            #   value: "https://cdn.difiori.com"
            # ADD DATABASE_URL OR OTHER SECRETS HERE
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: db-secret
            #       key: latest
  traffic:
    - percent: 100
      latestRevision: true
